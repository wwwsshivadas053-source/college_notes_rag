{% extends "base.html" %}
{% block title %}Register | College Notes RAG{% endblock %}
{% block content %}
<section class="mx-auto max-w-md rounded-[2rem] border border-ink/10 bg-white/70 p-8 shadow-xl">
  <h1 class="font-display text-4xl font-bold">Register</h1>
  <form method="post" class="mt-6 space-y-4">
    <input name="name" class="w-full rounded-2xl border border-ink/10 px-4 py-3" placeholder="Full name" required>
    <input name="email" type="email" class="w-full rounded-2xl border border-ink/10 px-4 py-3" placeholder="Email" required>
    <input name="password" type="password" minlength="6" class="w-full rounded-2xl border border-ink/10 px-4 py-3" placeholder="Password" required>
    <button class="w-full rounded-full bg-clay px-5 py-3 font-bold text-white">Create Account</button>
  </form>
</section>
{% endblock %}
